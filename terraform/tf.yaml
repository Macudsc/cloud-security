# Лог-группа для security telemetry
resource "yandex_logging_group" "sec_logs" {
  name             = "thesis-sec-logs"
  folder_id        = var.folder_id
  retention_period = "168h"
}

# Централизованный trail
resource "yandex_audit_trails_trail" "org_trail" {
  name               = "thesis-org-trail"
  folder_id          = var.folder_id
  service_account_id = var.trail_sa_id

  logging_destination {
    log_group_id = yandex_logging_group.sec_logs.id
  }

  storage_destination {
    bucket_name   = var.logs_bucket_name
    object_prefix = "audit/"
  }

  filtering_policy {
    management_events_filter {
      resource_scope {
        resource_id   = var.organization_id
        resource_type = "organization-manager.organization"
      }
    }

    data_events_filter {
      service         = "storage"
      included_events = ["BucketPolicyUpdate", "BucketAclUpdate", "BucketAccessBindingsUpdate"]
      resource_scope {
        resource_id   = var.cloud_id
        resource_type = "resource-manager.cloud"
      }
    }
  }
}

# Кластер Kubernetes
resource "yandex_kubernetes_cluster" "lab" {
  name        = "thesis-k8s"
  description = "cloud-native security lab"
  network_id  = var.network_id

  master {
    version   = var.k8s_version
    public_ip = var.public_api_enabled

    security_group_ids = [var.k8s_api_sg_id]

    zonal {
      zone      = var.zone
      subnet_id = var.private_subnet_id
    }

    master_logging {
      enabled                = true
      log_group_id           = yandex_logging_group.sec_logs.id
      kube_apiserver_enabled = true
      events_enabled         = true
      audit_enabled          = true
    }

    maintenance_policy {
      auto_upgrade = true
    }
  }

  service_account_id      = var.cluster_sa_id
  node_service_account_id = var.node_sa_id
  network_policy_provider = "CILIUM"

  kms_provider {
    key_id = var.kms_key_id
  }

  workload_identity_federation {
    enabled = true
  }
}

# Секрет в Lockbox
resource "yandex_lockbox_secret" "app_secret" {
  name                = "thesis-app-secret"
  folder_id           = var.folder_id
  kms_key_id          = var.kms_key_id
  deletion_protection = true
}

# Демонстрационный bucket: так НЕ надо в защищённом контуре
resource "yandex_storage_bucket" "demo_public" {
  bucket = var.demo_bucket_name

  anonymous_access_flags {
    read        = true
    list        = true
    config_read = true
  }
}