apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-app-readonly
  namespace: secure
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-app-readonly-binding
  namespace: secure
subjects:
  - kind: ServiceAccount
    name: demo-app
    namespace: secure
roleRef:
  kind: Role
  name: demo-app-readonly
  apiGroup: rbac.authorization.k8s.io
